<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Laboratório de Calibração</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
</head>
<body>
    <nav class="barra-admin">
        <h1 id="titulo-questao">Carregando...</h1>
        <div class="acoes-nav">
            <button onclick="salvarAlteracoesSandbox()" class="btn-salvar">💾 Salvar Alterações</button>
            <button onclick="window.close()" class="btn-sair">Fechar Laboratório</button>
        </div>
    </nav>

    <main class="container-admin sandbox-main">
        <div class="sandbox-header">
            <p id="missao-texto" class="sandbox-missao-texto"></p>
        </div>

        <div class="sandbox-grid">
            <div class="coluna-editor">
                <h3 class="sandbox-titulo-original">Código Original</h3>
                <textarea id="editor-sujo"></textarea>
                <button onclick="testarCodigo('sujo')" class="btn-teste btn-teste-logica">▶ Executar Testes (Lógica)</button>
                <div id="terminal-sujo" class="terminal">Aguardando execução...</div>
            </div>

            <div class="coluna-editor">
                <h3 class="sandbox-titulo-gabarito">Gabarito</h3>
                <textarea id="editor-limpo"></textarea>
                <button onclick="testarCodigo('limpo')" class="btn-teste">▶ Executar Testes (Rigoroso)</button>
                <div id="terminal-limpo" class="terminal">Aguardando execução...</div>
            </div>
        </div>
    </main>

    <script src="sandbox-logic.js"></script>
</body>
</html>
