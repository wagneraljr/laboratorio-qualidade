<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Laboratório de Calibração</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <style>
        .sandbox-header { text-align: center; margin-bottom: 20px; }
        .sandbox-grid { display: flex; gap: 20px; margin: 20px 0; }
        .coluna-editor { flex: 1; background: #fff; padding: 15px; border-radius: 8px; box-shadow: var(--sombra); border: var(--borda); }
        .CodeMirror { height: 500px !important; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        .terminal { background: #1e1e1e; color: #4af626; padding: 15px; border-radius: 4px; font-family: monospace; min-height: 120px; margin-top: 15px; overflow-y: auto; }
        .terminal.erro { color: #ff5555; }
        
        /* Ajuste fino para os botões do topo ficarem lado a lado */
        .acoes-nav { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <nav class="barra-admin">
        <h1 id="titulo-questao">Carregando...</h1>
        <div class="acoes-nav">
            <button onclick="salvarAlteracoesSandbox()" class="btn-salvar">💾 Salvar Alterações</button>
            <button onclick="window.close()" class="btn-sair">Fechar Laboratório</button>
        </div>
    </nav>

    <main class="container-admin" style="max-width: 1400px;">
        <div class="sandbox-header">
            <p id="missao-texto" style="font-size: 1.1rem; color: var(--cor-texto-claro); margin-top: 10px;"></p>
        </div>

        <div class="sandbox-grid">
            <div class="coluna-editor">
                <h3 style="color: var(--if-vermelho);">Código Original</h3>
                <textarea id="editor-sujo"></textarea>
                <button onclick="testarCodigo('sujo')" style="margin-top: 15px; width: 100%; background-color: #333;">▶ Executar Testes (Lógica)</button>
                <div id="terminal-sujo" class="terminal">Aguardando execução...</div>
            </div>

            <div class="coluna-editor">
                <h3 style="color: var(--if-verde);">Gabarito</h3>
                <textarea id="editor-limpo"></textarea>
                <button onclick="testarCodigo('limpo')" style="margin-top: 15px; width: 100%;">▶ Executar Testes (Rigoroso)</button>
                <div id="terminal-limpo" class="terminal">Aguardando execução...</div>
            </div>
        </div>
    </main>

    <script src="sandbox-logic.js"></script>
</body>
</html>
