<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acesso Administrativo - IF Sudeste MG</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="login-page">
    <div class="login-box">
        <img src="logo_if.png" alt="Logo IF" class="logo-login">
        <h2 class="titulo-login">Área do Professor</h2>
        <p class="subtitulo-login">Identifique-se para gerenciar o banco de questões.</p>
        
        <input type="password" id="senha" placeholder="Digite sua senha de acesso">
        <button onclick="fazerLogin()" class="btn-entrar">Acessar Painel</button>
        
        <a href="aluno.html" class="btn-voltar">← Voltar para o Modo Aluno</a>
    </div>

    <script>
        async function fazerLogin() {
            const senha = document.getElementById("senha").value;

            // CONCEITO DE TESTES: Tratamento de Exceção em Operação de Rede
            // fetch() pode lançar uma exceção se o servidor estiver fora do ar
            // ou não houver conexão. O try/catch garante que o professor receba
            // uma mensagem clara em vez de a página quebrar silenciosamente.
            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ senha })
                });

                // CONCEITO DE TESTES: Distinguir tipos de falha
                // res.ok = false é uma falha de AUTENTICAÇÃO (senha errada — HTTP 401).
                // O catch abaixo trata falha de CONEXÃO (servidor inacessível).
                // São problemas diferentes e merecem mensagens diferentes.
                if (res.ok) {
                    window.location.href = "admin.html";
                } else {
                    alert("Senha incorreta. Verifique e tente novamente.");
                }
            } catch (erro) {
                alert("Erro de conexão com o servidor. O servidor está rodando?");
                console.error("Falha ao tentar login:", erro);
            }
        }

        // Permitir login ao apertar Enter
        document.getElementById("senha").addEventListener("keypress", function(e) {
            if (e.key === "Enter") fazerLogin();
        });
    </script>
</body>
</html>
