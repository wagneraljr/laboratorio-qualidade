<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso Administrativo - IF Sudeste MG</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="login-page">
    <div class="login-box">
        <img src="logo_if.png" alt="Logo IF" class="logo-login">
        <h2 class="titulo-login">Área do Professor</h2>
        <p class="subtitulo-login">Identifique-se para gerenciar o banco de questões.</p>
        
        <input type="password" id="senha" placeholder="Digite sua senha de acesso">
        <button onclick="fazerLogin()" class="btn-entrar">Acessar Painel</button>
        
        <a href="aluno.html" class="btn-voltar">← Voltar para o Modo Aluno</a>
    </div>

    <script>
        async function fazerLogin() {
            const senha = document.getElementById("senha").value;
            const res = await fetch("/api/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ senha })
            });
            const dados = await res.json();
            if (dados.sucesso) {
                window.location.href = "admin.html";
            } else {
                alert("Senha incorreta. Verifique e tente novamente.");
            }
        }

        // Permitir login ao apertar Enter
        document.getElementById("senha").addEventListener("keypress", function(e) {
            if (e.key === "Enter") fazerLogin();
        });
    </script>
</body>
</html>
