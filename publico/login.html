<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso Administrativo - IF Sudeste MG</title>
    <link rel="stylesheet" href="estilo.css">
<style>
        /* NOVA REGRA: Transforma o body em um contêiner Flexbox centralizado */
        body {
            display: flex;
            justify-content: center; /* Centraliza no eixo horizontal (Esquerda/Direita) */
            align-items: center;     /* Centraliza no eixo vertical (Cima/Baixo) */
            min-height: 100vh;       /* Garante que o body ocupe 100% da altura da tela */
            margin: 0;               /* Remove as bordas brancas padrão do navegador */
            background: #f0f2f5;     /* Cor de fundo suave */
        }

        /* O restante continua igual */
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 1em; 
            box-sizing: border-box; 
        }
        .btn-entrar { 
            width: 100%; 
            padding: 12px; 
            background: var(--if-verde); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1em; 
            transition: 0.3s; 
        }
        .btn-entrar:hover { 
            background: var(--if-verde-escuro); 
        }
        .btn-voltar { 
            display: block; 
            margin-top: 20px; 
            color: #666; 
            text-decoration: none; 
            font-size: 0.9em; 
        }
        .btn-voltar:hover { 
            color: #333; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="logo_if.png" alt="Logo IF" style="max-width: 250px; margin-bottom: 20px;">
        <h2 style="color: #333;">Área do Professor</h2>
        <p style="color: #666;">Identifique-se para gerenciar o banco de questões.</p>
        
        <input type="password" id="senha" placeholder="Digite sua senha de acesso">
        <button onclick="fazerLogin()" class="btn-entrar">Acessar Painel</button>
        
        <a href="aluno.html" class="btn-voltar">← Voltar para o Modo Aluno</a>
    </div>

    <script>
        async function fazerLogin() {
            const senha = document.getElementById("senha").value;
            const res = await fetch("/api/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ senha })
            });
            const dados = await res.json();
            if (dados.sucesso) {
                window.location.href = "admin.html";
            } else {
                alert("Senha incorreta. Verifique e tente novamente.");
            }
        }

        // Permitir login ao apertar Enter
        document.getElementById("senha").addEventListener("keypress", function(e) {
            if (e.key === "Enter") fazerLogin();
        });
    </script>
</body>
</html>
